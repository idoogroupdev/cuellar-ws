services:
  backend:
    build: .
    restart: always
    command: ["gunicorn", "config.wsgi:application", "--bind", "0.0.0.0:80"]
    env_file:
      - ./.env
    expose:
      - 80

  celery:
    build: .
    restart: always
    command: ["celery", "-A", "config", "worker", "--loglevel=ERROR"]
    env_file:
      - ./.env
    depends_on:
      - backend
    networks:
      - dokploy-network
      - default

  celery-beat:
    build: .
    restart: always
    command: ["celery", "-A", "config", "beat", "--loglevel=ERROR"]
    env_file:
      - ./.env
    depends_on:
      - backend
    networks:
      - dokploy-network
      - default
